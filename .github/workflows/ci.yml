name: CI

on:
  push:
    branches: [ main, master, develop, 'enhancement/**', 'feature/**' ]
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Android build & unit tests ───────────────────────────────────────────────
  android:
    name: Android (APK + Tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: app/build/reports/tests/
          retention-days: 7

  # ── iOS KMP framework compile check ───────────────────────────────────────────
  # Proves all iOS Kotlin/Native code compiles successfully.
  # Full Xcode + Simulator run requires physical macOS access; use a Mac locally
  # or a cloud Mac service (MacStadium, MacinCloud, AWS EC2 Mac) for UI testing.
  ios:
    name: iOS (KMP framework compile)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle & Konan caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-macos-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-macos-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile KMP framework for iOS Simulator (arm64)
        run: ./gradlew :app:linkDebugFrameworkIosSimulatorArm64 --stacktrace

      - name: Verify framework was produced
        run: |
          FRAMEWORK=app/build/bin/iosSimulatorArm64/debugFramework/ComposeApp.framework
          if [ ! -d "$FRAMEWORK" ]; then
            echo "ERROR: Framework not found at $FRAMEWORK"
            ls -la app/build/bin/iosSimulatorArm64/debugFramework/ 2>/dev/null || true
            exit 1
          fi
          echo "✓ ComposeApp.framework built successfully"
          ls -lh "$FRAMEWORK/ComposeApp"

      - name: Upload framework
        uses: actions/upload-artifact@v4
        with:
          name: ComposeApp-framework-iosSimulatorArm64
          path: app/build/bin/iosSimulatorArm64/debugFramework/ComposeApp.framework
          retention-days: 7

  # ── Release APK (on tags only) ───────────────────────────────────────────────
  release:
    name: Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ android, ios ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
